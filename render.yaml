services:
  - type: web
    name: vulnscan-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:5000 api.app:app
    envVars:
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: worker
    name: vulnscan-celery
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A api.app.celery worker --loglevel=info --pool=solo
    envVars:
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false